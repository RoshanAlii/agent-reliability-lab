name: ci

on:
  push:
  pull_request:

jobs:
  tests-and-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run unit tests
        run: pytest
      - name: Run eval gate
        run: python scripts/run_eval_gate.py --dataset data/evals/core_benchmark.yaml --min-score 0.80
